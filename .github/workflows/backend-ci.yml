name: Backend CI

on:
  push:
    branches: [master]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    branches: [master]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  workflow_dispatch:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run all checks
        run: ./gradlew checkCI
