spring:
  application:
    name: device-id
  datasource:
    url: jdbc:h2:mem:deviceid
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  seed-data: ${SEED_DATA:false}
