<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Device Identification Platform</title>
    <style>
      .app-fallback {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        max-width: 600px;
        margin: 80px auto;
        padding: 24px;
        border: 1px solid #f0c36d;
        background: #fcf8e3;
        border-radius: 8px;
        color: #333;
      }
      .app-fallback h1 {
        margin-top: 0;
        font-size: 20px;
      }
      .app-fallback code {
        background: #f4f4f4;
        padding: 2px 6px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-fallback">
        <h1>Application failed to load</h1>
        <p>
          The page's JavaScript could not be loaded. This is usually caused by a privacy
          extension (such as <strong>uBlock Origin</strong> or <strong>Brave Shields</strong>)
          blocking the bundled <code>@fingerprintjs/fingerprintjs</code> module.
        </p>
        <p>To use this demo, please disable the extension for this site and reload the page.</p>
      </div>
    </div>
    <noscript>
      <div class="app-fallback">
        <h1>JavaScript is required</h1>
        <p>This application requires JavaScript to run. Please enable it in your browser.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
